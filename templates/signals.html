<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trade Signals</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Live Trade Signals</h1>
    <p>Below are the most recent signals analyzed by the system:</p>

    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Asset</th>
                <th>Signal</th>
                <th>Confidence</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>15:45:00</td>
                <td>EUR/USD</td>
                <td>Buy</td>
                <td>89%</td>
            </tr>
            <tr>
                <td>15:44:30</td>
                <td>GBP/USD</td>
                <td>Sell</td>
                <td>76%</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
